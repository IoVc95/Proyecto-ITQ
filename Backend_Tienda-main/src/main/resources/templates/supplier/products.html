<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos del proveedor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 32px;
            color: #222;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px 10px;
            text-align: left;
        }

        th {
            background: #f4f4f4;
        }
    </style>
</head>
<body>
<h1>Productos del proveedor</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Barcode</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Activo</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${products}">
        <td th:text="${product.id}">1</td>
        <td th:text="${product.name}">Producto</td>
        <td th:text="${product.barcode}">000000</td>
        <td th:text="${product.price}">0.00</td>
        <td th:text="${product.stock}">0</td>
        <td th:text="${product.active}">true</td>
    </tr>
    <tr th:if="${#lists.isEmpty(products)}">
        <td colspan="6">No hay productos registrados.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
